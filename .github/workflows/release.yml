name: Release

on:
  push:
    tags:
      - 'v*'
      - '*-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v0.3.0 or narrative-desktop-mvp-v0.3.0). Must already exist as a GitHub Release.'
        required: true
        type: string

jobs:
  generate-icons:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install icon tooling
        run: python3 -m pip install --upgrade pip pillow

      - name: Generate Tauri icons
        run: python3 scripts/generate-icons-pil.py

      - name: Upload icons artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-icons
          path: src-tauri/icons

  build:
    needs: generate-icons
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Download icons artifact
        uses: actions/download-artifact@v7
        with:
          name: tauri-icons
          path: src-tauri/icons

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Resolve GitHub Release ID (by tag)
        id: resolve_release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            if (!tag) {
              core.setFailed(`Missing release tag.`);
              return;
            }
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            core.setOutput('release_id', String(release.id));

      - name: Resolve release signing args
        id: build_args
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          build_args="${{ matrix.args }}"
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] || [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            if [ -n "$build_args" ]; then
              build_args="$build_args --no-sign"
            else
              build_args="--no-sign"
            fi
          fi
          echo "args=$build_args" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseId: ${{ steps.resolve_release.outputs.release_id }}
          releaseDraft: false
          prerelease: false
          args: ${{ steps.build_args.outputs.args }}

  verify-release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: always() && needs.build.result == 'success'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify required assets exist on the tag release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { owner, repo } = context.repo;

            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const names = new Set((release.assets || []).map(a => a.name));

            const requiredAny = [
              // macOS: require at least one DMG (arch-specific names vary by tauri-action config)
              { label: 'macOS DMG', predicate: (n) => n.toLowerCase().endsWith('.dmg') },
              // Updater: latest.json must exist for the configured endpoint
              { label: 'latest.json', predicate: (n) => n === 'latest.json' },
            ];

            for (const req of requiredAny) {
              const ok = Array.from(names).some(req.predicate);
              if (!ok) {
                core.setFailed(`Missing required release asset: ${req.label}. Assets: ${Array.from(names).join(', ')}`);
                return;
              }
            }

            core.info(`Release ${tag} has DMG + latest.json. Asset count: ${names.size}`);

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install

      - name: Generate release gate artifacts
        run: |
          pnpm tauri:generate-rollout-artifacts
          pnpm tauri:generate-release-artifacts

      - name: Verify release gate artifacts
        run: |
          pnpm tauri:verify-rollout-artifacts
          pnpm tauri:verify-release-artifacts
          jq -e '.window_hours == 24 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .auth_failure_rate <= 0.01 and .crash_loop_count == 0' artifacts/release/codex-app-server/canary-5p.json
          jq -e '.window_hours == 24 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .auth_failure_rate <= 0.01 and .crash_loop_count == 0' artifacts/release/codex-app-server/canary-25p.json
          jq -e '.wrong_arch_failures == 0 and .supported_arch_smoke_pass == true' artifacts/release/codex-app-server/os-arch-smoke.json
          jq -e '.window_hours >= 168 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .parser_error_rate <= 0.001 and .event_lag_p95_ms <= 250' artifacts/release/codex-app-server/soak-100p.json
          jq -e '.dashboards_live == true and .alerts_routed_owner != null and (.sli_definitions | length) >= 6' artifacts/release/codex-app-server/telemetry-readiness.json

      - name: Upload release gate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codex-release-gate-artifacts
          path: artifacts/release/codex-app-server/
