name: harness-gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  harness-gates:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
          run_install: false

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: '[ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc || true'

      - name: Install dependencies
        run: pnpm install

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.5"

      - name: Install ralph CLI
        run: |
          set -euo pipefail
          mkdir -p artifacts/policy
          if uv tool install "ralph-gold==1.0.0"; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            "$HOME/.local/bin/ralph" --version
            exit 0
          fi

          if uv tool install "git+https://github.com/jscraik/ralph-gold.git@5d4b57537a29c3edb566665c9482ae5ca1d49eed"; then
            cat > artifacts/policy/ralph-fallback-warning.json <<JSON
          {"warning":"ralph_runtime_fallback","reason":"pypi_package_unavailable","fallback":"uv_git","package":"ralph-gold==1.0.0","gitSpec":"git+https://github.com/jscraik/ralph-gold.git@5d4b57537a29c3edb566665c9482ae5ca1d49eed","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          JSON
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            "$HOME/.local/bin/ralph" --version
            exit 0
          fi

          echo "Unable to install pinned ralph runtime via uv."
          exit 1

      - name: Authorization gate
        run: |
          set -euo pipefail
          bash scripts/harness-cli.sh check-authz \
            --contract harness.contract.json \
            --repo "${{ github.repository }}" \
            --branch "${{ github.head_ref }}"

      - name: Environment gate
        env:
          CLAUDE_APPROVAL_POSTURE: require
          CODEX_SANDBOX_MODE: sandboxed
        run: |
          set -euo pipefail
          mkdir -p .harness
          bash scripts/harness-cli.sh check-environment \
            --contract harness.contract.json \
            --attestation .harness/environment-attestation.json

      - name: Memory gate
        run: |
          set -euo pipefail
          bash scripts/harness-cli.sh memory-gate \
            --memory memory.json \
            --forjamie README.md \
            --metrics "$RUNNER_TEMP/harness-memory-metrics.json"

      - name: Collect changed files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .harness

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | sed '/^$/d' > .harness/changed-files.txt

          node -e "const fs = require('fs'); const files = fs.readFileSync('.harness/changed-files.txt', 'utf8').split(/\r?\n/).filter(Boolean); const jsFiles = files.filter((f) => /\.(?:c|m)?(?:ts|js)x?$/.test(f)); fs.writeFileSync('.harness/changed-js-files.txt', jsFiles.length > 0 ? jsFiles.join('\n') + '\n' : '');"

      - name: Run harness policy gates
        shell: bash
        env:
          HAS_DIFF_BUDGET_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'diff-budget-override') }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ ! -s .harness/changed-files.txt ]; then
            echo "No changed files detected; skipping harness gates."
            exit 0
          fi

          FILES_CSV="$(node -e "const fs=require('fs'); const files=fs.readFileSync('.harness/changed-files.txt','utf8').split(/\r?\n/).filter(Boolean); process.stdout.write(files.join(','));")"

          bash scripts/harness-cli.sh blast-radius --contract harness.contract.json --files "$FILES_CSV" --verbose
          bash scripts/harness-cli.sh risk-tier --contract harness.contract.json --files "$FILES_CSV"
          bash scripts/harness-cli.sh policy-gate --contract harness.contract.json --files "$FILES_CSV"
          bash scripts/harness-cli.sh preflight-gate --contract harness.contract.json --files "$FILES_CSV" --head-sha "${{ github.event.pull_request.head.sha }}"

          if [ "$HAS_DIFF_BUDGET_OVERRIDE" = "true" ]; then
            cat > .harness/diff-budget-override.json <<JSON
          {"reason":"Approved via diff-budget-override PR label","approvedBy":"$GITHUB_ACTOR","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          JSON
          fi

          diff_budget_args=(
            --contract harness.contract.json
            --base "${{ github.event.pull_request.base.sha }}"
            --head "${{ github.event.pull_request.head.sha }}"
          )
          if [ -f .harness/diff-budget-override.json ]; then
            diff_budget_args+=(--override .harness/diff-budget-override.json)
          fi
          bash scripts/harness-cli.sh diff-budget "${diff_budget_args[@]}"

          bash scripts/harness-cli.sh evidence-verify --contract harness.contract.json --changed "$FILES_CSV"

          if [ -s .harness/changed-js-files.txt ]; then
            JS_FILES_CSV="$(node -e "const fs=require('fs'); const files=fs.readFileSync('.harness/changed-js-files.txt','utf8').split(/\r?\n/).filter(Boolean); process.stdout.write(files.join(','));")"
            bash scripts/harness-cli.sh silent-error --files "$JS_FILES_CSV"
          else
            echo "No JS/TS files changed; skipping silent-error gate."
          fi

      - name: Upload harness attestation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-environment-attestation
          path: .harness/environment-attestation.json
