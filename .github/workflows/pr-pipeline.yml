name: Harness PR Pipeline

on: pull_request

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: '[ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

  harness-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: '[ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Get changed files
        id: changed-files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          mkdir -p .harness
          FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD | tr '\n' ',' | sed 's/,$//')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "$FILES" > .harness/changed-files.txt

      - name: Run harness policy gates
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.sha }}
          HAS_DIFF_BUDGET_OVERRIDE: ${{ contains(github.event.pull_request.labels.*.name, 'diff-budget-override') }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ ! -s .harness/changed-files.txt ]; then
            echo "No changed files detected; skipping harness gates."
            exit 0
          fi

          FILES_CSV=$(cat .harness/changed-files.txt)

          bash scripts/harness-cli.sh blast-radius --contract harness.contract.json --files "$FILES_CSV" --verbose
          bash scripts/harness-cli.sh risk-tier --contract harness.contract.json --files "$FILES_CSV"
          bash scripts/harness-cli.sh policy-gate --contract harness.contract.json --files "$FILES_CSV"
          bash scripts/harness-cli.sh preflight-gate --contract harness.contract.json --files "$FILES_CSV" --head-sha "$HEAD_SHA"

          if [ "$HAS_DIFF_BUDGET_OVERRIDE" = "true" ]; then
            cat > .harness/diff-budget-override.json <<JSON
          {"reason":"Approved via diff-budget-override PR label","approvedBy":"$GITHUB_ACTOR","timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          JSON
          fi

          diff_budget_args=(
            --contract harness.contract.json
            --base "origin/$BASE_REF"
            --head "$HEAD_SHA"
          )
          if [ -f .harness/diff-budget-override.json ]; then
            diff_budget_args+=(--override .harness/diff-budget-override.json)
          fi
          bash scripts/harness-cli.sh diff-budget "${diff_budget_args[@]}"

          bash scripts/harness-cli.sh evidence-verify --contract harness.contract.json --changed "$FILES_CSV"

          # Check for JS/TS files and run silent-error check (grep may return 1 when no matches)
          JS_TS_FOUND=false
          if echo "$FILES_CSV" | grep -qE '\.(ts|tsx|js|jsx)' 2>/dev/null; then
            JS_TS_FOUND=true
          fi
          if [ "$JS_TS_FOUND" = true ]; then
            JS_FILES=$(echo "$FILES_CSV" | tr ',' '\n' | grep -E '\.(ts|tsx|js|jsx)$' | tr '\n' ',' || true)
            if [[ -n "$JS_FILES" && "$JS_FILES" != "," ]]; then
              bash scripts/harness-cli.sh silent-error --files "$JS_FILES"
            else
              echo "No JS/TS files changed; skipping silent-error gate."
            fi
          else
            echo "No JS/TS files changed; skipping silent-error gate."
          fi
