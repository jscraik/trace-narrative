name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Configure npm auth for private packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
          fi

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Verify codex sidecar manifest integrity
        run: pnpm tauri:verify-sidecar-manifest

      - name: Security audit
        run: pnpm audit --prod --audit-level moderate
        continue-on-error: false

      - name: Security audit (dev dependencies advisory)
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Integration tests
        run: pnpm test:integration

      - name: Generate codex rollout canary artifacts
        run: pnpm tauri:generate-rollout-artifacts

      - name: Verify codex rollout canary artifacts
        run: |
          pnpm tauri:verify-rollout-artifacts
          jq -e '.window_hours == 24 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .auth_failure_rate <= 0.01 and .crash_loop_count == 0' artifacts/release/codex-app-server/canary-5p.json
          jq -e '.window_hours == 24 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .auth_failure_rate <= 0.01 and .crash_loop_count == 0' artifacts/release/codex-app-server/canary-25p.json
          jq -e '.wrong_arch_failures == 0 and .supported_arch_smoke_pass == true' artifacts/release/codex-app-server/os-arch-smoke.json

      - name: Generate codex release gate artifacts
        run: pnpm tauri:generate-release-artifacts

      - name: Verify codex release gate artifacts
        run: |
          pnpm tauri:verify-release-artifacts
          jq -e '.window_hours >= 168 and .handshake_p99_ms <= 5000 and .pending_timeout_rate <= 0.005 and .parser_error_rate <= 0.001 and .event_lag_p95_ms <= 250' artifacts/release/codex-app-server/soak-100p.json
          jq -e '.dashboards_live == true and .alerts_routed_owner != null and (.sli_definitions | length) >= 6' artifacts/release/codex-app-server/telemetry-readiness.json

      - name: Upload codex rollout artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codex-rollout-artifacts
          path: artifacts/release/codex-app-server/

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Configure npm auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: '[ -n "$NPM_TOKEN" ] && echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc || true'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  rust-tests:
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Verify codex sidecar trust/path policy tests
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml codex_app_server_trust
          cargo test --manifest-path src-tauri/Cargo.toml codex_app_server_path_policy
          cargo test --manifest-path src-tauri/Cargo.toml codex_app_server_schema_drift_gate
